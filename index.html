<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yassir_ID — Front-End Developer & Student</title>
    <meta name="description" content="Portfolio Yassir — Seorang pelajar dan pengembang front-end yang mencintai dunia pemrograman. Vue.js, Tailwind CSS, dan teknologi web modern.">
    <meta name="keywords" content="Yassir, Front-End Developer, Vue.js, Portfolio, Web Developer">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

    <!-- Prevent flash of wrong theme -->
    <script>
      (function() {
        const saved = localStorage.getItem('yssr-theme');
        if (saved === 'dark' || (!saved && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
</head>
<body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
</body>
</html>
